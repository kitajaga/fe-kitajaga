<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1fae5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield body -->
  <path d="M100 15 L170 50 C170 50 175 130 100 185 C25 130 30 50 30 50 Z" 
        fill="url(#shieldGrad)" 
        stroke="none"
        filter="url(#glow)"/>
  
  <!-- Inner shield highlight -->
  <path d="M100 30 L155 58 C155 58 159 120 100 168 C41 120 45 58 45 58 Z" 
        fill="none" 
        stroke="rgba(255,255,255,0.25)" 
        stroke-width="1.5"/>
  
  <!-- Heart symbol -->
  <path d="M100 130 
           C70 105 55 90 55 78 
           C55 65 65 55 78 55 
           C87 55 95 61 100 68 
           C105 61 113 55 122 55 
           C135 55 145 65 145 78 
           C145 90 130 105 100 130 Z" 
        fill="url(#heartGrad)" 
        opacity="0.95"/>
  
  <!-- Heartbeat line -->
  <polyline points="65,88 82,88 88,72 94,100 100,82 106,92 112,85 118,88 135,88" 
            fill="none" 
            stroke="#0D9488" 
            stroke-width="3" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
  
  <!-- Plus signs (care symbols) -->
  <g opacity="0.6" fill="white">
    <rect x="38" y="38" width="8" height="2" rx="1"/>
    <rect x="41" y="35" width="2" height="8" rx="1"/>
    
    <rect x="152" y="42" width="6" height="1.5" rx="0.75"/>
    <rect x="154.25" y="39.75" width="1.5" height="6" rx="0.75"/>
    
    <rect x="80" y="22" width="5" height="1.5" rx="0.75"/>
    <rect x="81.75" y="20.25" width="1.5" height="5" rx="0.75"/>
  </g>
</svg>
